<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АДМИН</title>
<style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 15px;background:#111;border:1px solid #333;cursor:pointer;color:#fff;font-size:14px}
.tab.active{background:#c00;border-color:#c00}
.tab-content{display:none}
.tab-content.active{display:block}
form{background:#111;padding:20px;margin-bottom:20px;max-width:400px}
input,textarea,button{display:block;width:100%;padding:10px;margin:10px 0;background:#1a1a1a;border:1px solid #333;color:#fff}
button{background:#c00;cursor:pointer;border:none}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;text-align:left;border-bottom:1px solid #333}
th{color:#c00}
</style>
</head>
<body>
<h1>АДМИН</h1>
<div class="tabs">
  <div class="tab active" onclick="showTab('add')">ДОБАВИТЬ</div>
  <div class="tab" onclick="showTab('tracks')">ТРЕКИ</div>
  <div class="tab" onclick="showTab('videos')">ВИДЕО</div>
  <div class="tab" onclick="showTab('concerts')">МЕРОПРИЯТИЯ</div>
  <div class="tab" onclick="showTab('gallery')">ГАЛЕРЕЯ</div>
</div>

<div class="tab-content active" id="tab-add">
  <form action="/api/admin/track" method="POST" enctype="multipart/form-data">
    <h2>ДОБАВИТЬ ТРЕК</h2>
    <input name="title" placeholder="НАЗВАНИЕ" required>
    <textarea name="description" placeholder="ОПИСАНИЕ"></textarea>
    <input name="url" placeholder="ССЫЛКА" required>
    <input type="file" name="cover" accept="image/*">
    <button>ДОБАВИТЬ</button>
  </form>
  <form action="/api/admin/video" method="POST">
    <h2>ДОБАВИТЬ ВИДЕО</h2>
    <input name="title" placeholder="НАЗВАНИЕ" required>
    <textarea name="description" placeholder="ОПИСАНИЕ"></textarea>
    <input name="youtube_url" placeholder="ССЫЛКА YOUTUBE" required>
    <button>ДОБАВИТЬ</button>
  </form>
  <form action="/api/admin/concert" method="POST">
    <h2>ДОБАВИТЬ МЕРОПРИЯТИЕ</h2>
    <input name="city" placeholder="ГОРОД" required>
    <input name="venue" placeholder="ПЛОЩАДКА">
    <input name="date" placeholder="ДАТА" required>
    <input name="time" placeholder="ВРЕМЯ">
    <input name="ticket_url" placeholder="ССЫЛКА НА БИЛЕТЫ">
    <button>ДОБАВИТЬ</button>
  </form>
</div>

<div class="tab-content" id="tab-tracks"><h2>ТРЕКИ</h2><div id="tracks-table">Загрузка...</div></div>
<div class="tab-content" id="tab-videos"><h2>ВИДЕО</h2><div id="videos-table">Загрузка...</div></div>
<div class="tab-content" id="tab-concerts"><h2>МЕРОПРИЯТИЯ</h2><div id="concerts-table">Загрузка...</div></div>
<div class="tab-content" id="tab-gallery">
  <h2>ГАЛЕРЕЯ</h2>
  <form action="/api/admin/gallery" method="POST" enctype="multipart/form-data">
    <input name="title" placeholder="ЗАГОЛОВОК">
    <input type="file" name="image" accept="image/*" required>
    <button>ДОБАВИТЬ</button>
  </form>
  <div id="gallery-table">Загрузка...</div>
</div>

<script>
function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-'+name).classList.add('active');
  var tabs = document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) {
    if(tabs[i].textContent.toLowerCase().indexOf(name) !== -1 || 
       (name==='add' && tabs[i].textContent==='ДОБАВИТЬ') ||
       (name==='tracks' && tabs[i].textContent==='ТРЕКИ') ||
       (name==='videos' && tabs[i].textContent==='ВИДЕО') ||
       (name==='concerts' && tabs[i].textContent==='МЕРОПРИЯТИЯ') ||
       (name==='gallery' && tabs[i].textContent==='ГАЛЕРЕЯ')) {
      tabs[i].classList.add('active');
    }
  }
  if(name==='tracks') loadTracks();
  if(name==='videos') loadVideos();
  if(name==='concerts') loadConcerts();
  if(name==='gallery') loadGallery();
}

function loadTracks() {
  fetch('/api/tracks').then(function(r){return r.json()}).then(function(d){
    var c=document.getElementById('tracks-table');
    if(!d.length){c.innerHTML='Нет треков';return}
    c.innerHTML='<table><tr><th>НАЗВАНИЕ</th><th>ССЫЛКА</th></tr>'+d.map(function(t){return '<tr><td>'+t.title+'</td><td><a href="'+t.file+'" target="_blank">ОТКРЫТЬ</a></td></tr>'}).join('')+'</table>';
  });
}

function loadVideos() {
  fetch('/api/videos').then(function(r){return r.json()}).then(function(d){
    var c=document.getElementById('videos-table');
    if(!d.length){c.innerHTML='Нет видео';return}
    c.innerHTML='<table><tr><th>НАЗВАНИЕ</th><th>ССЫЛКА</th></tr>'+d.map(function(v){return '<tr><td>'+v.title+'</td><td><a href="'+v.youtube_url+'" target="_blank">ОТКРЫТЬ</a></td></tr>'}).join('')+'</table>';
  });
}

function loadConcerts() {
  fetch('/api/concerts').then(function(r){return r.json()}).then(function(d){
    var c=document.getElementById('concerts-table');
    if(!d.length){c.innerHTML='Нет мероприятий';return}
    c.innerHTML='<table><tr><th>ДАТА</th><th>ГОРОД</th></tr>'+d.map(function(co){return '<tr><td>'+co.date+'</td><td>'+co.city+'</td></tr>'}).join('')+'</table>';
  });
}

function loadGallery() {
  fetch('/api/gallery').then(function(r){return r.json()}).then(function(d){
    var c=document.getElementById('gallery-table');
    if(!d.length){c.innerHTML='Нет фото';return}
    c.innerHTML='<table><tr><th>ФОТО</th><th>ЗАГОЛОВОК</th></tr>'+d.map(function(g){return '<tr><td><img src="/uploads/'+g.file+'" style="width:100px;height:100px;object-fit:cover"></td><td>'+g.title+'</td></tr>'}).join('')+'</table>';
  });
}
</script>
</body>
</html>
